name: Pre-Deploy Security & QA Gate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-audit:
    name: Agency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: XSS Static Analysis (Block set:html)
        run: |
          echo "Scanning for raw set:html usage..."
          # Find all set:html usage in Astro templates
          if grep -rn "set:html" src/; then
            echo "::error:: SECURITY VIOLATION: Raw set:html found in Astro templates!"
            echo "::error:: Unsanitized set:html is vulnerable to XSS via LLM prompt injection in copy.json."
            echo "::error:: You MUST use the <SanitizedHTML> component or DOMPurify."
            exit 1
          fi

      - name: Secrets Leak Detection
        run: |
          echo "Scanning for exposed API keys..."
          if grep -rnE "sk_live|pk_live|Bearer [A-Za-z0-9_]{20,}|ghp_" src/; then
            echo "::error:: SECURITY VIOLATION: Hardcoded API keys or secrets found in codebase!"
            exit 1
          fi

      - name: Form Security Audit
        run: |
          echo "Verifying Form Endpoints..."
          if grep -rnE "action=[\"']http://" src/; then
            echo "::error:: SECURITY VIOLATION: Unencrypted HTTP form action found!"
            exit 1
          fi

      - name: Dependency Vulnerability Scan
        run: npm audit --audit-level=high

  lighthouse-ci:
    name: Lighthouse Performance & SEO
    runs-on: ubuntu-latest
    needs: security-audit # Only run if security passes
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
