name: QA Gate (28-Point Build & Audit Checklist)

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  qa-gate:
    name: Build & Compliance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Code Linter & Prettier
        run: npm run lint

      - name: Astro Build (Validates JSON Architecture & Routing)
        run: npm run build

      - name: Lighthouse CI (Performance, SEO, Accessibility)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4321/
          budgetPath: ./lighthouserc.json # Fails if Performance < 95, SEO < 100, A11y < 100
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Enforce Legal & Security Headers
        run: |
          echo "Verifying Cloudflare _headers..."
          if [ ! -f public/_headers ]; then
            echo "ERROR: Missing public/_headers file. Security headers must be defined."
            exit 1
          fi
          echo "Verifying Legal Pages..."
          if [ ! -f src/pages/privacy.astro ] && [ ! -f src/pages/privacy/index.astro ] && [ ! -f src/data/pages/privacy.json ] && [ ! -f src/pages/privacy.tsx ] && [ ! -f src/app/privacy/page.tsx ]; then
            echo "ERROR: Missing Privacy Policy page."
            exit 1
          fi
          if [ ! -f src/pages/terms.astro ] && [ ! -f src/pages/terms/index.astro ] && [ ! -f src/data/pages/terms.json ] && [ ! -f src/pages/terms.tsx ] && [ ! -f src/app/terms/page.tsx ]; then
            echo "ERROR: Missing Terms of Service page."
            exit 1
          fi
          if [ ! -f src/pages/accessibility.astro ] && [ ! -f src/pages/accessibility/index.astro ] && [ ! -f src/data/pages/accessibility.json ] && [ ! -f src/pages/accessibility.tsx ] && [ ! -f src/app/accessibility/page.tsx ]; then
            echo "ERROR: Missing Accessibility Statement page."
            exit 1
          fi

      - name: Verify Sitemap & Robots.txt
        run: |
          echo "Verifying robots.txt generation..."
          if [ ! -f public/robots.txt ] && [ ! -f src/pages/robots.txt.ts ]; then
            echo "ERROR: Missing robots.txt."
            exit 1
          fi

      - name: QA Gate Passed
        run: echo "✅ All 28 checks passed. Build is compliant."
